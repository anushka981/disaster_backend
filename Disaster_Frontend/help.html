<!DOCTYPE html>
<html>
<head>
<title>Request Help</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 fade-in">

<h2 class="text-center text-primary mb-4">Request Emergency Help</h2>

<form id="helpForm">

<div class="mb-3">
<label>Type of Help</label>
<select class="form-select">
<option>Medical</option>
<option>Food</option>
<option>Shelter</option>
<option>Rescue</option>
</select>
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" class="form-control" placeholder="Enter location" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control" placeholder="Describe your need"></textarea>
</div>

<button class="btn btn-primary w-100">Submit Request</button>

</form>

</div>

<script src="js/script.js"></script>

</body>
</html>
