<!DOCTYPE html>
<html>

<head>

<title>Volunteer Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-danger">

<div class="container">

<a class="navbar-brand">Volunteer Dashboard</a>

<a href="index.html" class="btn btn-light">Home</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Active Disaster Reports</h2>

<table class="table table-bordered text-center">

<thead class="table-danger">

<tr>

<th>Disaster Type</th>
<th>Location</th>
<th>Description</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>Flood</td>
<td>Delhi</td>
<td>Heavy flooding in residential area</td>

<td id="status1">Pending</td>

<td>
<button class="btn btn-success" onclick="acceptTask(1)">
Accept
</button>
</td>

</tr>

<tr>

<td>Fire</td>
<td>Mumbai</td>
<td>Fire in apartment building</td>

<td id="status2">Pending</td>

<td>
<button class="btn btn-success" onclick="acceptTask(2)">
Accept
</button>
</td>

</tr>

<tr>

<td>Earthquake</td>
<td>Nepal Border</td>
<td>Buildings collapsed</td>

<td id="status3">Pending</td>

<td>
<button class="btn btn-success" onclick="acceptTask(3)">
Accept
</button>
</td>

</tr>

</tbody>

</table>

</div>

<div class="container mt-5">

<h3 class="text-center">Update Task Status</h3>

<div class="text-center mt-3">

<button class="btn btn-warning m-2" onclick="updateStatus('In Progress')">
In Progress
</button>

<button class="btn btn-primary m-2" onclick="updateStatus('Completed')">
Completed
</button>

</div>

</div>

<script>

let currentTask = null;

function acceptTask(id){

currentTask = id;

document.getElementById("status"+id).innerText = "Accepted";

alert("You accepted this disaster response task");

}

function updateStatus(status){

if(currentTask == null){

alert("Please accept a task first");

return;

}

document.getElementById("status"+currentTask).innerText = status;

alert("Task status updated to " + status);

}

</script>

</body>

</html>
