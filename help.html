<!DOCTYPE html>
<html>
<head>
<title>Request Help</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 fade-in">

<h2 class="text-center text-primary mb-4">Request Emergency Help</h2>

<form id="helpForm">

<div class="mb-3">
<label>Type of Help</label>
<select class="form-select">
<option>Medical</option>
<option>Food</option>
<option>Shelter</option>
<option>Rescue</option>
</select>
</div>

<!-- 🔥 UPDATED LOCATION -->
<div class="mb-3">
<label>Location</label>

<select class="form-select" onchange="handleLocationChange(this, 'helpOtherLocation')" required>
<option value="">Select Location</option>

<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Hyderabad</option>
<option>Chennai</option>
<option>Kolkata</option>

<option>Meerut</option>
<option>Lucknow</option>
<option>Noida</option>
<option>Ghaziabad</option>

<option>Other</option>
</select>

<input type="text" id="helpOtherLocation" class="form-control mt-2"
placeholder="Enter your location" style="display:none;">
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control" placeholder="Describe your need"></textarea>
</div>

<button class="btn btn-primary w-100">Submit Request</button>

</form>

</div>

<script src="js/script.js"></script>

<!-- 🔥 LOCATION SCRIPT -->
<script>
function handleLocationChange(select, inputId) {
  let otherInput = document.getElementById(inputId);

  if (select.value === "Other") {
    otherInput.style.display = "block";
    otherInput.required = true;
  } else {
    otherInput.style.display = "none";
    otherInput.required = false;
  }
}
</script>

</body>
</html>
