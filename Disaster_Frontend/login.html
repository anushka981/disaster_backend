<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="col-md-4 mx-auto">

<div class="card p-4 shadow">

<h3 class="text-center mb-3">Login</h3>

<form onsubmit="loginUser(event)">

<select id="role" class="form-select mb-3" required>
<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="volunteer">Volunteer</option>
</select>

<input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

</div>
</div>
</div>

<script>
function loginUser(e){
e.preventDefault();

let role = document.getElementById("role").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

// Dummy login
if(role === "admin" && username === "admin" && password === "1234"){
    localStorage.setItem("role","admin");
    window.location.href = "admin.html";
}
else if(role === "volunteer" && username === "user" && password === "1234"){
    localStorage.setItem("role","volunteer");
    window.location.href = "volunteer.html";
}
else{
    alert("Invalid Credentials");
}
}
</script>
<script>
function loginUser(e){
e.preventDefault();

let role = document.getElementById("role").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(u => 
    u.username === username && 
    u.password === password &&
    u.role === role
);

if(user){
    localStorage.setItem("role", role);
    localStorage.setItem("username", username);

    if(role === "admin"){
        window.location.href = "admin.html";
    } else {
        window.location.href = "volunteer.html";
    }
}
else{
    alert("Invalid credentials!");
}
}
</script>

</body>
</html>
