<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="col-md-4 mx-auto">

<div class="card p-4 shadow">
<h3 class="text-center mb-3">Signup</h3>

<form onsubmit="signupUser(event)">

<select id="role" class="form-select mb-3" required>
<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="volunteer">Volunteer</option>
</select>

<input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-success w-100">Signup</button>

<p class="text-center mt-2">
Already have an account? <a href="login.html">Login</a>
</p>

</form>
</div>
</div>
</div>

<script>
function signupUser(e){
e.preventDefault();

let role = document.getElementById("role").value;
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

// Get existing users
let users = JSON.parse(localStorage.getItem("users")) || [];

// Check if user exists
let exist = users.find(user => user.username === username);
if(exist){
    alert("User already exists!");
    return;
}

// Add new user
users.push({role, username, password});
localStorage.setItem("users", JSON.stringify(users));

alert("Signup successful!");
window.location.href = "login.html";
}
</script>

</body>
</html>
